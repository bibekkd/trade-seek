services:
  postgres:
    image: postgres:16-alpine
    container_name: algo-trading-postgres
    environment:
      POSTGRES_DB: algo_trading
      POSTGRES_USER: algo
      POSTGRES_PASSWORD: algo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algo -d algo_trading"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: algo-trading-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

